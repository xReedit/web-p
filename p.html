		function xdirectPrintBytes(socket, bytes) {
				var result = directPrint(socket, new Uint8Array(bytes).buffer);

			function directPrint(socket, printData) {

					return false;
				}
				if (printSocket.readyState !== printSocket.OPEN) {

				}
				// Serialise, send.

				return true;
			}
